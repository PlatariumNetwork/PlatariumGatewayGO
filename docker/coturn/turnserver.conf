# Minimal coturn for Platarium messenger WebRTC relay.
# Replace EXTERNAL_IP and credentials before production use.

listening-port=3478
tls-listening-port=5349

# Public IPv4/IPv6 of this host (required behind NAT).
# external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=YOUR_PUBLIC_IPV4

realm=platarium.network
fingerprint
lt-cred-mech
user=platarium:CHANGE_ME_TURN_SECRET

# Relay port range - open these in firewall/security group.
min-port=49152
max-port=65535

no-multicast-peers
no-cli
log-file=stdout
verbose
